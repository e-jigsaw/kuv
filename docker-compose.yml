services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: kuv
      POSTGRES_USER: kuv
      POSTGRES_PASSWORD: kuv
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kuv -d kuv"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - db-data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    environment:
      PORT: 3001
      KUV_JWT_SECRET: ${KUV_JWT_SECRET}
      KUV_DB_HOST: postgres
      KUV_DB_USER: kuv
      KUV_DB_PASSWORD: kuv
      KUV_DB_DATABASE: kuv
    depends_on:
      postgres:
        condition: service_healthy

  caddy:
    image: caddy:2-alpine
    ports:
      - "8080:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      # web は静的SPA。`pnpm --filter @kuv/web build` で生成した dist/client を bind-mount する。
      # `docker compose up` の前に web をビルドしておくこと。
      # （本番向けに web をイメージへ焼く self-contained 化は後続のデプロイ整備フェーズで対応）
      - ./packages/web/dist/client:/srv/web
    depends_on:
      - api

volumes:
  db-data:
